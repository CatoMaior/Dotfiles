backend = "glx";
vsync = true;
inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;

# Dim inactive windows. (0.0 - 1.0)
inactive-dim = 0.1;
focus-exclude = [
  "name = 'slop'",
  "name = 'dunst'",
  #"name ~= '(Meeting)'",
  "ANTIDIM_FLAG@:8c",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'",
  "_NET_WM_STATE@:32a = '_NET_WM_STATE_FULLSCREEN'"
];
